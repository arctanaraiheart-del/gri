<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRI — Gripe Rephrase Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1A1209;
    --paper: #F5F0E8;
    --gold: #C8963E;
    --red: #8B2020;
    --green: #1A5C3A;
    --blue: #1A3A5C;
    --border: #D4C9B0;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(200,150,62,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,32,32,0.04) 0%, transparent 50%);
  }

  /* ヘッダー */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 2px;
    background: var(--gold);
  }
  .site-title {
    font-family: 'Zen Antique', serif;
    font-size: clamp(48px, 10vw, 72px);
    letter-spacing: 0.08em;
    color: var(--gold);
    line-height: 1.1;
  }
  .site-title-sub {
    font-size: 12px;
    color: #B0A898;
    margin-top: 4px;
    letter-spacing: 0.2em;
    font-weight: 300;
  }
  .site-sub {
    font-size: 13px;
    color: #7A6E60;
    margin-top: 8px;
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  .container { max-width: 760px; margin: 0 auto; padding: 0 1rem; }

  /* 入力セクション sticky */
  .input-section {
    position: sticky; top: 0; z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 0;
  }
  .input-section .container { display: flex; flex-direction: column; gap: 8px; }

  textarea#inp {
    width: 100%; min-height: 70px; max-height: 120px;
    resize: none; font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; background: #FDFAF4; color: var(--ink);
    outline: none; transition: border-color 0.2s; line-height: 1.7;
  }
  textarea#inp:focus { border-color: var(--gold); }
  textarea#inp::placeholder { color: #B0A898; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mode-group { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .mode-btn {
    font-size: 12px; padding: 6px 16px; border-radius: 2px;
    border: 1px solid var(--border); background: transparent;
    color: #7A6E60; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 400;
    letter-spacing: 0.05em; transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--gold); color: var(--gold); }
  .mode-btn.active-elegant { background: var(--blue); color: #D4E4F4; border-color: var(--blue); font-weight: 500; }
  .mode-btn.active-poetic  { background: var(--green); color: #C8F0DC; border-color: var(--green); font-weight: 500; }
  .mode-btn.active-comedy  { background: var(--red); color: #F4D0D0; border-color: var(--red); font-weight: 500; }

  .go-btn {
    padding: 8px 24px; font-size: 13px; font-weight: 500;
    letter-spacing: 0.08em; border: none; background: var(--gold);
    color: #FDF8EE; border-radius: 2px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .go-btn:hover { opacity: 0.85; }
  .go-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 結果カード */
  .result-card {
    display: none;
    background: #FDFAF4;
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 0;
    animation: fadeIn 0.3s ease;
  }
  .result-card.on { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  .result-loading {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--gold); letter-spacing: 0.06em;
  }
  .dot-anim { display: flex; gap: 3px; }
  .dot-anim span { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; animation: dotbl 1.2s infinite; }
  .dot-anim span:nth-child(2){animation-delay:.2s}
  .dot-anim span:nth-child(3){animation-delay:.4s}
  @keyframes dotbl{0%,80%,100%{opacity:.2}40%{opacity:1}}

  .result-text {
    font-size: 16px; color: var(--ink); line-height: 1.9;
    font-weight: 300; display: none;
  }
  .result-text.on { display: block; }

  .result-bottom {
    display: none; gap: 8px; margin-top: 14px;
    align-items: center; flex-wrap: wrap; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .result-bottom.on { display: flex; }

  .r-label { font-size: 12px; color: #7A6E60; white-space: nowrap; }
  .rbtn {
    padding: 4px 14px; font-size: 12px; border-radius: 2px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .rbtn:hover { border-color: var(--gold); }
  .rbtn.selected { background: #E8F5EE; color: var(--green); border-color: var(--green); font-weight: 500; }

  .rec-btn {
    margin-left: auto; padding: 6px 20px; font-size: 12px;
    font-weight: 500; letter-spacing: 0.06em;
    border: 1px solid var(--green); background: var(--green);
    color: #C8F0DC; border-radius: 2px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; white-space: nowrap;
  }

  .err-msg {
    display: none; font-size: 13px; color: var(--red);
    padding: 8px 12px; background: #F8EAEA;
    border-radius: 4px; margin-top: 8px;
  }

  /* APIキー設定 */
  .api-section {
    background: #FFF8E7; border-top: 1px solid #F0D080; padding: 1.25rem 0;
  }
  .api-inner { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
  .api-info { flex: 1; min-width: 200px; }
  .api-info h3 { font-size: 13px; font-weight: 500; color: #7A5A00; margin-bottom: 4px; }
  .api-info p { font-size: 12px; color: #9A7820; line-height: 1.6; }
  .api-info a { color: var(--gold); }
  .api-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .api-input-row input {
    flex: 1; padding: 7px 12px; border: 1px solid #E0C878;
    border-radius: 4px; font-size: 12px; font-family: monospace;
    background: white; color: var(--ink); outline: none;
  }
  .api-input-row input:focus { border-color: var(--gold); }
  .api-save-btn {
    padding: 7px 16px; border: none; background: var(--gold);
    color: white; border-radius: 4px; font-size: 12px;
    cursor: pointer; white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .api-ok { font-size: 12px; color: var(--green); margin-top: 6px; display: none; }

  /* 履歴 */
  .history-section { padding: 2rem 0 4rem; }
  .hist-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 1.25rem; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .hist-header h2 {
    font-family: 'Zen Antique', serif; font-size: 18px;
    letter-spacing: 0.1em; color: var(--ink); font-weight: 400;
  }
  .hist-count { font-size: 12px; color: #7A6E60; }
  .empty-state {
    text-align: center; padding: 3rem 1rem; color: #B0A898;
    font-size: 14px; font-weight: 300; letter-spacing: 0.06em;
  }
  .empty-state::before { content: '⬡'; display: block; font-size: 28px; margin-bottom: 12px; opacity: 0.3; }

  .hitem {
    border: 1px solid var(--border); border-radius: 4px;
    margin-bottom: 10px; background: #FDFAF4; overflow: hidden;
    transition: border-color 0.2s;
  }
  .hitem:hover { border-color: var(--gold); }
  .hitem-main { padding: 14px 16px; }
  .hconv { font-size: 15px; color: var(--ink); line-height: 1.8; font-weight: 300; }
  .hmeta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .hmeta-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 2px; letter-spacing: 0.05em; font-weight: 500; }
  .tag-elegant { background: #D4E4F4; color: var(--blue); }
  .tag-poetic  { background: #C8F0DC; color: var(--green); }
  .tag-comedy  { background: #F4D0D0; color: var(--red); }
  .tag-r { font-size: 10px; color: #7A6E60; }
  .htime { font-size: 10px; color: #B0A898; }
  .toggle-btn {
    background: none; border: 1px solid var(--border); border-radius: 2px;
    cursor: pointer; color: #B0A898; font-size: 10px; padding: 3px 8px;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; white-space: nowrap;
  }
  .toggle-btn:hover { border-color: var(--gold); color: var(--gold); }
  .horig-wrap {
    display: none; padding: 10px 16px 14px;
    border-top: 1px solid var(--border); background: #FAF5EC;
  }
  .horig-wrap.on { display: block; animation: fadeIn 0.2s ease; }
  .horig-label { font-size: 10px; color: #B0A898; letter-spacing: 0.06em; margin-bottom: 6px; }
  .horig-text { font-size: 13px; color: #5A4E40; line-height: 1.7; font-weight: 300; }

  footer {
    text-align: center; padding: 2rem 1rem;
    border-top: 1px solid var(--border); font-size: 11px;
    color: #B0A898; letter-spacing: 0.06em;
  }
  @media (max-width: 480px) {
    .controls { flex-direction: column; align-items: stretch; }
    .go-btn { text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1 class="site-title">GRI</h1>
    <p class="site-title-sub">Gripe Rephrase Interface</p>
    <p class="site-sub">どんな暴言も、美しい言葉へと変換する</p>
  </div>
</header>


<!-- 入力（sticky） -->
<div class="input-section">
  <div class="container">
    <textarea id="inp" placeholder="変換したい言葉・文章を入力してください..."></textarea>
    <div class="controls">
      <div class="mode-group" id="modeRow">
        <button class="mode-btn" data-mode="elegant">上品モード</button>
        <button class="mode-btn" data-mode="poetic">詩的モード</button>
        <button class="mode-btn" data-mode="comedy">コメディモード</button>
      </div>
      <button class="go-btn" id="goBtn">変換する</button>
    </div>
  </div>
</div>

<!-- 結果カード -->
<div class="container">
  <div class="result-card" id="resultCard">
    <div class="result-loading" id="resultLoading">
      <span>変換中</span>
      <span class="dot-anim"><span></span><span></span><span></span></span>
    </div>
    <div class="result-text" id="resultText"></div>
    <div class="err-msg" id="errMsg"></div>
    <div class="result-bottom" id="resultBottom">
      <span class="r-label">面白さ：</span>
      <button class="rbtn" data-r="最高">最高</button>
      <button class="rbtn" data-r="まあまあ">まあまあ</button>
      <button class="rbtn" data-r="微妙">微妙</button>
      <button class="rec-btn" id="recBtn">記録する</button>
    </div>
  </div>
</div>

<!-- 履歴 -->
<div class="history-section">
  <div class="container">
    <div class="hist-header">
      <h2>変換の記録</h2>
      <span class="hist-count" id="histCount"></span>
    </div>
    <div id="histList"><div class="empty-state">変換した言葉がここに記録されます</div></div>
  </div>
</div>

<footer>
  <div class="container">GRI — Gripe Rephrase Interface</div>
</footer>

<script>
var mode = 'elegant';
var hist = [];
var lastOrig = '';
var lastConv = '';
var selectedR = '';
var apiKey = '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';

var modeLabels = {elegant:'上品', poetic:'詩的', comedy:'コメディ'};
var modeSystems = {
  elegant: '以下の言葉や文章を、極めて上品で丁寧な日本語表現に変換してください。言葉の意味・ニュアンスをしっかり汲み取り、その内容に対応した上品な表現に変換してください。変換後の文章のみ返してください。',
  poetic:  '以下の言葉や文章を、俳句または短歌に変換してください。ただし、元の言葉の登場人物・状況・感情・具体的な出来事を必ず詩の中に盛り込んでください。自然や季節の比喩は使っても構いませんが、元の内容と全く関係のない詩にはしないでください。変換後の俳句または短歌のみ返してください。',
  comedy:  '以下の言葉や文章を、思わず笑ってしまうコメディ的な大げさな褒め言葉に変換してください。言葉の意味・ニュアンスをしっかり汲み取り、その内容に関連した滑稽な表現に変換してください。変換後の文章のみ返してください。'
};


function styleMode() {
  document.querySelectorAll('.mode-btn').forEach(function(b) {
    b.className = 'mode-btn';
    if (b.dataset.mode === mode) b.classList.add('active-' + mode);
  });
}

document.getElementById('modeRow').addEventListener('click', function(e) {
  var b = e.target.closest('.mode-btn'); if (!b) return;
  mode = b.dataset.mode; styleMode();
});

document.querySelectorAll('.rbtn').forEach(function(b) {
  b.addEventListener('click', function() {
    selectedR = b.dataset.r;
    document.querySelectorAll('.rbtn').forEach(function(x){ x.classList.remove('selected'); });
    b.classList.add('selected');
  });
});

document.getElementById('goBtn').addEventListener('click', doConvert);

async function doConvert() {
  var text = document.getElementById('inp').value.trim();
  if (!text) return;

  lastOrig = text;
  lastConv = '';
  selectedR = '';
  document.querySelectorAll('.rbtn').forEach(function(x){ x.classList.remove('selected'); });

  var card = document.getElementById('resultCard');
  var loading = document.getElementById('resultLoading');
  var resultText = document.getElementById('resultText');
  var bottom = document.getElementById('resultBottom');
  var errMsg = document.getElementById('errMsg');
  var btn = document.getElementById('goBtn');

  card.classList.add('on');
  loading.style.display = 'flex';
  resultText.classList.remove('on');
  bottom.classList.remove('on');
  errMsg.style.display = 'none';
  btn.disabled = true;

  try {
    var res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 400,
        messages: [
          {role: 'system', content: modeSystems[mode]},
          {role: 'user', content: text}
        ]
      })
    });

    if (!res.ok) {
      var e = await res.json().catch(function(){return {};});
      throw new Error((e.error && e.error.message) || 'エラーが発生しました');
    }

    var data = await res.json();
    var result = (data.choices || []).map(function(c){ return c.message && c.message.content || ''; }).join('').trim();
    if (!result) throw new Error('変換結果が空でした');

    lastConv = result;
    loading.style.display = 'none';
    resultText.textContent = result;
    resultText.classList.add('on');
    bottom.classList.add('on');

  } catch(err) {
    loading.style.display = 'none';
    errMsg.textContent = 'エラー：' + err.message;
    errMsg.style.display = 'block';
  }

  btn.disabled = false;
}

document.getElementById('recBtn').addEventListener('click', function() {
  if (!lastConv) return;
  hist.unshift({
    orig: lastOrig, conv: lastConv,
    mode: mode, r: selectedR || '－',
    time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})
  });
  document.getElementById('resultCard').classList.remove('on');
  document.getElementById('inp').value = '';
  renderHist();
});

function renderHist() {
  var list = document.getElementById('histList');
  var count = document.getElementById('histCount');
  count.textContent = hist.length + '件';
  if (!hist.length) {
    list.innerHTML = '<div class="empty-state">変換した言葉がここに記録されます</div>';
    return;
  }
  list.innerHTML = hist.map(function(h, i) {
    return '<div class="hitem">'
      + '<div class="hitem-main">'
      + '<div class="hconv">' + escHtml(h.conv) + '</div>'
      + '<div class="hmeta">'
      + '<div class="hmeta-left">'
      + '<span class="tag tag-' + h.mode + '">' + modeLabels[h.mode] + '</span>'
      + '<span class="tag-r">面白さ：' + h.r + '</span>'
      + '<span class="htime">' + h.time + '</span>'
      + '</div>'
      + '<button class="toggle-btn" onclick="toggle(' + i + ', this)">元の文章 ▼</button>'
      + '</div>'
      + '</div>'
      + '<div class="horig-wrap" id="orig-' + i + '">'
      + '<div class="horig-label">元の言葉</div>'
      + '<div class="horig-text">' + escHtml(h.orig) + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function toggle(i, btn) {
  var wrap = document.getElementById('orig-' + i);
  var isOpen = wrap.classList.contains('on');
  wrap.classList.toggle('on');
  btn.textContent = isOpen ? '元の文章 ▼' : '元の文章 ▲';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

styleMode();
</script>
</body>
</html>
